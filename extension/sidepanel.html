<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chart Eye</title>
  <style>
    /* ============================================================
       DESIGN TOKENS
    ============================================================ */
    :root {
      --bg-base:       #0a0e1a;
      --bg-card:       #0f1628;
      --bg-input:      #131929;
      --border-dim:    #1e2a45;
      --border-glow:   #00d4ff33;
      --cyan:          #00d4ff;
      --cyan-dim:      #00d4ff18;
      --cyan-mid:      #00d4ff44;
      --purple:        #8b5cf6;
      --purple-dim:    #8b5cf618;
      --purple-glow:   #8b5cf640;
      --amber:         #f59e0b;
      --green:         #10d48a;
      --text-primary:  #e2e8f0;
      --text-muted:    #64748b;
      --text-dim:      #94a3b8;
      --text-secondary: #cbd5e1;
      --font-mono:     'Courier New', 'Consolas', monospace;
      --font-ui:       'Segoe UI', system-ui, sans-serif;
    }

    /* ============================================================
       RESET & BASE
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background-color: var(--bg-base);
      background-image: radial-gradient(circle, #1a2035 1px, transparent 1px);
      background-size: 22px 22px;
      color: var(--text-primary);
      font-family: var(--font-ui);
      font-size: 13px;
      display: flex;
      flex-direction: column;
      min-width: 320px;
    }

    /* ============================================================
       HEADER
    ============================================================ */
    #header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px 9px;
      border-bottom: 1px solid var(--border-dim);
      background: linear-gradient(180deg, #0c1120 0%, var(--bg-base) 100%);
      flex-shrink: 0;
      position: relative;
    }

    #header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan-mid), transparent);
      opacity: 0.6;
    }

    #brand {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--cyan);
      text-shadow: 0 0 12px var(--cyan), 0 0 24px var(--cyan-mid);
      user-select: none;
    }

    #status-indicator {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 1.5px;
      color: var(--text-muted);
    }

    #status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 7px var(--cyan);
      transition: background 0.4s, box-shadow 0.4s;
    }

    /* State: scanning */
    body.scanning #status-dot {
      background: var(--amber);
      box-shadow: 0 0 7px var(--amber);
      animation: dotPulse 0.7s ease-in-out infinite;
    }
    body.scanning #status-text::after  { content: '...'; }

    /* State: analyzing */
    body.analyzing #status-dot {
      background: var(--purple);
      box-shadow: 0 0 7px var(--purple);
      animation: dotPulse 0.45s ease-in-out infinite;
    }

    /* ============================================================
       SVG EYE — state-driven via body class
    ============================================================ */
    #eye-logo {
      flex-shrink: 0;
      filter: drop-shadow(0 0 4px var(--cyan-mid));
    }

    /* Iris ring rotates while busy */
    body.scanning  #eye-iris-ring { animation: spinRing 1.8s linear infinite; }
    body.analyzing #eye-iris-ring { animation: spinRing 1.0s linear infinite; }

    /* Pupil blinks in idle */
    body.idle #eye-pupil { animation: eyeBlink 5s ease-in-out infinite; }

    /* Glow pulse on logo when analyzing */
    body.analyzing #eye-logo {
      filter: drop-shadow(0 0 8px var(--purple));
    }

    /* ============================================================
       VISION STRIP
    ============================================================ */
    #vision-strip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      overflow-x: auto;
      min-height: 56px;
      max-height: 56px;
      border-bottom: 1px solid var(--border-dim);
      background: var(--bg-card);
      flex-shrink: 0;
      scrollbar-width: thin;
      scrollbar-color: var(--border-dim) transparent;
    }

    #vision-strip:empty::before {
      content: 'NO CAPTURES YET';
      color: var(--cyan-mid);
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 2.5px;
      width: 100%;
      text-align: center;
      opacity: 0.8;
    }

    .vision-thumb-wrap {
      flex-shrink: 0;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .vision-thumb {
      width: 68px;
      height: 38px;
      border-radius: 3px;
      border: 1px solid var(--border-dim);
      object-fit: cover;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
      display: block;
    }

    .vision-thumb:hover         { border-color: var(--cyan); box-shadow: 0 0 6px var(--cyan-dim); }
    .vision-thumb-wrap.active .vision-thumb {
      border-color: var(--cyan);
      box-shadow: 0 0 8px var(--cyan);
    }

    .vision-label {
      font-family: var(--font-mono);
      font-size: 8px;
      color: var(--text-secondary);
      letter-spacing: 0.5px;
      white-space: nowrap;
      overflow: hidden;
      max-width: 68px;
      text-overflow: ellipsis;
      font-weight: 500;
    }

    /* Arrow connector between thumbs */
    .vision-arrow {
      flex-shrink: 0;
      color: var(--cyan-mid);
      font-size: 10px;
      align-self: center;
      padding-bottom: 10px;
    }

    /* ============================================================
       CHAT AREA
    ============================================================ */
    #chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      scrollbar-width: thin;
      scrollbar-color: var(--border-dim) transparent;
    }

    /* --- message bubbles --- */
    .msg {
      display: flex;
      flex-direction: column;
      max-width: 90%;
    }

    .msg.user    { align-self: flex-end;   align-items: flex-end; }
    .msg.ai      { align-self: flex-start; align-items: flex-start; }
    .msg.system  { align-self: center; max-width: 100%; }

    .msg-bubble {
      padding: 7px 11px;
      border-radius: 8px;
      line-height: 1.55;
      font-size: 12.5px;
      word-break: break-word;
    }

    .msg.user .msg-bubble {
      background: var(--cyan-dim);
      border: 1px solid var(--cyan-mid);
      color: var(--cyan);
      border-bottom-right-radius: 2px;
    }

    .msg.ai .msg-bubble {
      background: var(--bg-card);
      border: 1px solid var(--border-dim);
      color: var(--text-primary);
      border-bottom-left-radius: 2px;
      box-shadow: 0 0 16px var(--purple-dim), inset 0 0 24px var(--purple-dim);
    }

    .msg.system .msg-bubble {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 1.5px;
      padding: 2px 0;
      text-align: center;
    }

    /* role labels */
    .msg-role {
      font-family: var(--font-mono);
      font-size: 8px;
      letter-spacing: 1.5px;
      margin-bottom: 3px;
      color: var(--text-dim);
      font-weight: 600;
    }

    .msg.user .msg-role  { color: var(--cyan); }
    .msg.ai   .msg-role  { color: var(--purple); }

    /* typing dots */
    .typing-dots { display: flex; gap: 4px; align-items: center; padding: 10px 14px; }
    .typing-dots span {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--purple);
      animation: typingBounce 1.1s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.18s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.36s; }

    /* ============================================================
       INPUT AREA
    ============================================================ */
    #input-area {
      padding: 10px 14px 14px;
      border-top: 1px solid var(--border-dim);
      display: flex;
      gap: 8px;
      flex-shrink: 0;
      background: linear-gradient(0deg, #0c1120 0%, var(--bg-base) 100%);
    }

    #user-input {
      flex: 1;
      min-width: 0;
      background: var(--bg-input);
      border: 1px solid var(--border-dim);
      border-radius: 6px;
      padding: 9px 11px;
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 11px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #user-input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 10px var(--cyan-dim);
    }

    #user-input::placeholder { color: var(--text-muted); }
    #user-input:disabled { opacity: 0.45; cursor: not-allowed; }

    #analyze-btn {
      background: linear-gradient(135deg, #00558a 0%, #3a0090 100%);
      border: 1px solid var(--cyan);
      border-radius: 6px;
      color: var(--cyan);
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      padding: 9px 13px;
      cursor: pointer;
      white-space: nowrap;
      transition: box-shadow 0.2s, opacity 0.2s;
      box-shadow: 0 0 10px var(--border-glow);
      flex-shrink: 0;
    }

    #analyze-btn:hover:not(:disabled) {
      box-shadow: 0 0 20px var(--cyan), 0 0 40px var(--border-glow);
    }

    #analyze-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* ============================================================
       COACHING CARD COMPONENTS
    ============================================================ */

    /* Outer wrapper — overrides .msg-bubble defaults */
    .coaching-card {
      background: var(--bg-card);
      border: 1px solid var(--border-dim);
      border-radius: 8px;
      border-bottom-left-radius: 2px;
      box-shadow: 0 0 20px var(--purple-dim), inset 0 0 30px var(--purple-dim);
      padding: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 0;
      font-size: 12.5px;
      line-height: 1.5;
    }

    /* Zoom warning banner — shown when TooZoomedIn or TooZoomedOut */
    .zoom-warning {
      display: flex;
      align-items: flex-start;
      gap: 7px;
      padding: 8px 11px;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.5px;
      border-bottom: 1px solid;
    }
    .zoom-warning.too-in {
      background: rgba(245,158,11,0.10);
      border-color: rgba(245,158,11,0.35);
      color: var(--amber);
    }
    .zoom-warning.too-out {
      background: rgba(239,68,68,0.08);
      border-color: rgba(239,68,68,0.30);
      color: #ef4444;
    }
    .zoom-warning-icon { flex-shrink: 0; font-size: 12px; }
    .zoom-warning-body { display: flex; flex-direction: column; gap: 3px; }
    .zoom-warning-msg  { font-weight: 700; }
    .zoom-warning-cta  { opacity: 0.85; font-weight: 400; }

    /* Main content padding area */
    .coaching-body { padding: 10px 11px; display: flex; flex-direction: column; gap: 8px; }

    /* Badge row: phase, bias, confidence */
    .badge-row { display: flex; flex-wrap: wrap; gap: 5px; }
    .badge {
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.5px;
      padding: 3px 7px;
      border-radius: 3px;
      border: 1px solid;
      text-transform: uppercase;
    }
    .badge-phase {
      color: var(--purple);
      border-color: var(--purple);
      background: var(--purple-dim);
    }
    .badge-bullish  { color: var(--green);  border-color: var(--green);  background: rgba(16,212,138,0.10); }
    .badge-bearish  { color: #ef4444;       border-color: #ef4444;       background: rgba(239,68,68,0.10); }
    .badge-neutral  { color: var(--amber);  border-color: var(--amber);  background: rgba(245,158,11,0.10); }
    .badge-high     { color: var(--cyan);   border-color: var(--cyan);   background: var(--cyan-dim); }
    .badge-medium   { color: var(--amber);  border-color: var(--amber);  background: rgba(245,158,11,0.10); }
    .badge-low      { color: var(--text-muted); border-color: var(--border-dim); background: transparent; }

    /* Coach commentary — main text block */
    .coach-commentary { color: var(--text-primary); word-break: break-word; }

    /* Phase explanation — secondary muted text */
    .phase-explanation { color: var(--text-muted); font-size: 11.5px; }

    /* Section headings */
    .coaching-section-title {
      font-family: var(--font-mono);
      font-size: 8px;
      letter-spacing: 2px;
      color: var(--cyan-mid);
      text-transform: uppercase;
      margin-bottom: 4px;
      font-weight: 600;
    }

    /* Pattern / FVG entries */
    .pattern-list { display: flex; flex-direction: column; gap: 3px; }
    .pattern-entry {
      font-size: 11.5px;
      display: flex;
      align-items: flex-start;
      gap: 5px;
    }
    .pattern-entry .pattern-icon { flex-shrink: 0; width: 14px; text-align: center; }
    .pattern-entry.valid  { color: var(--cyan); }
    .pattern-entry.invalid { color: var(--text-muted); text-decoration: line-through; text-decoration-color: var(--text-muted); }
    .pattern-entry .pattern-text strong { font-weight: 700; }
    .pattern-entry .pattern-ctx { display: block; font-size: 10.5px; opacity: 0.7; margin-top: 1px; }

    .fvg-entry {
      font-size: 11.5px;
      display: flex;
      align-items: flex-start;
      gap: 5px;
    }
    .fvg-entry.bullish { color: var(--green); }
    .fvg-entry.bearish { color: #ef4444; }

    /* Call to action block */
    .cta-block {
      border: 1px solid var(--cyan-mid);
      border-radius: 5px;
      background: var(--cyan-dim);
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .cta-title {
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--cyan);
    }
    .cta-text { color: var(--text-primary); font-size: 12px; }

    /* ============================================================
       SCROLLBAR STYLING (webkit)
    ============================================================ */
    ::-webkit-scrollbar       { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-dim); border-radius: 2px; }

    /* ============================================================
       KEYFRAME ANIMATIONS
    ============================================================ */
    @keyframes dotPulse {
      0%, 100% { opacity: 1;   }
      50%       { opacity: 0.2; }
    }

    @keyframes spinRing {
      from { transform: rotate(0deg);   }
      to   { transform: rotate(360deg); }
    }

    @keyframes eyeBlink {
      0%, 88%, 100% { transform: scaleY(1);    }
      93%            { transform: scaleY(0.08); }
    }

    @keyframes typingBounce {
      0%, 80%, 100% { transform: translateY(0);   }
      40%            { transform: translateY(-5px); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0);   }
    }

    .msg { animation: fadeIn 0.2s ease-out; }
  </style>
</head>
<body class="idle">

  <!-- ======================================================
       HEADER
  ====================================================== -->
  <div id="header">

    <!-- Animated SVG Eye -->
    <svg id="eye-logo" width="30" height="22" viewBox="0 0 30 22"
         fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- eyelid outline -->
      <path d="M1.5 11 C7 2.5 23 2.5 28.5 11 C23 19.5 7 19.5 1.5 11 Z"
            stroke="#00d4ff" stroke-width="1.2" fill="none"
            stroke-linejoin="round"/>
      <!-- iris ring (rotates when busy) -->
      <circle id="eye-iris-ring" cx="15" cy="11" r="6"
              stroke="#8b5cf6" stroke-width="1" fill="none"
              stroke-dasharray="3.5 2.5"
              style="transform-origin: 15px 11px;"/>
      <!-- iris fill -->
      <circle cx="15" cy="11" r="5"
              fill="#8b5cf611" stroke="#8b5cf6" stroke-width="0.6"/>
      <!-- pupil (blinks in idle) -->
      <circle id="eye-pupil" cx="15" cy="11" r="2.8"
              fill="#00d4ff"
              style="transform-origin: 15px 11px;"/>
      <!-- specular highlight -->
      <circle cx="16.8" cy="9.2" r="0.9" fill="rgba(255,255,255,0.55)"/>
    </svg>

    <span id="brand">CHART EYE</span>

    <div id="status-indicator">
      <div id="status-dot"></div>
      <span id="status-text">READY</span>
    </div>

  </div>

  <!-- ======================================================
       VISION STRIP  (screenshot breadcrumbs)
  ====================================================== -->
  <div id="vision-strip"></div>

  <!-- ======================================================
       CHAT AREA
  ====================================================== -->
  <div id="chat-area"></div>

  <!-- ======================================================
       INPUT AREA
  ====================================================== -->
  <div id="input-area">
    <input id="user-input"
           type="text"
           placeholder="Ask about the chart..."
           autocomplete="off"
           spellcheck="false">
    <button id="analyze-btn">ANALYZE</button>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
